#############################
# Plugins
#############################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

#############################
# Gruvbox Dark Palette Inline
#############################
# Status bar base
set -g status-style bg=colour237,fg=colour223

# Windows
set -g window-status-format "#[fg=colour239,bg=colour237]#[fg=colour246,bg=colour239] #I:#W #[fg=colour239,bg=colour237]"
set -g window-status-style "bg=colour239,fg=colour246"

# Active window pane: Gruvbox yellow
set -g window-status-current-style "bg=colour214,fg=colour237"
set -g window-status-current-format "#[fg=colour214,bg=colour237]#[fg=colour237,bg=colour214] #I:#W #[fg=colour214,bg=colour237]"

# Window with activity
set -g window-status-activity-style "bg=colour239,fg=colour214"

# Panes
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour214 # yellow border for active pane
setw -g pane-border-status top

# Messages & mode
set -g message-style bg=colour239,fg=colour223
set -g message-command-style bg=colour239,fg=colour223
set -g mode-style bg=colour239,fg=colour214

# Update plugins at most once per day
run -b '~/.tmux/update-plugins-daily.sh'

#############################
# Window, Pane & Titles
#############################
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
set -g renumber-windows on
set -g set-titles on
setw -g aggressive-resize on
set -s escape-time 0
set -g history-limit 50000

# Pane borders
set-window-option -g pane-border-status top

#############################
# Display & UX
#############################
set -g display-time 4000
set -g focus-events on
set -g monitor-activity on
set -g visual-activity on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set-option -g mouse on

#############################
# Resurrect & Continuum
#############################
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy 'session'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

#############################
# Keys & Bindings
#############################
# Prefix to Ctrl-Space
set -g prefix C-space
unbind-key C-b
bind-key C-space send-prefix

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Open windows & splits in current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Clear screen + history with Ctrl-l
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

#############################
# Shell
#############################
set -g default-terminal "screen-256color"
set -g status-keys emacs
set -g default-command /bin/zsh

#############################
# Hot Reload
#############################
bind R source-file $HOME/.tmux.conf

#############################
# Status Bar & Theme
#############################
set -g status-position top
set -g status-justify left
set -g status-interval 15

# Status-right with direct script calls (avoids plugin interpolation bugs in WSL2)
set -g status-right "#[bg=colour237,fg=colour239]\
#[bg=colour239,fg=colour246] CPU: #( ~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh ) \
 Batt: #( ~/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh ) \
 %Y-%m-%d  %H:%M \
#[bg=colour239,fg=colour248]#[bg=colour248,fg=colour237] #h "
#
#############################
# Initialize TPM
#############################
run '~/.tmux/plugins/tpm/tpm'
