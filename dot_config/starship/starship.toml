$kubernetes\
$shell\
$container\
$jobs\
${custom.memory_usage}\
${custom.battery}\
${custom.keyboard_layout}\
$time\
$cmd_duration\
$status\
$line_break\
$character\
"""

# Timeout for commands executed by starship (in milliseconds).
command_timeout = 3600000

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#86BBD8"
format = '[$time ]($style)'

[character]
success_symbol = "[ÔØ»](purple)"
error_symbol = "[ÔØ»](red)"
vimcmd_symbol = "[ÔØ«](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "ÔÇï"
untracked = "ÔÇï"
modified = "ÔÇï"
staged = "ÔÇï"
renamed = "ÔÇï"
deleted = "ÔÇï"
stashed = "Ôëí"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"

[username]
show_always = true
style_user = "bg:#86BBD8"
style_root = "bg:#86BBD8"
format = '[$user]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating sy:whichstem
