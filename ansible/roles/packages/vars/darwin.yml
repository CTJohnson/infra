---
# roles/packages/vars/darwin.yml — macOS (Homebrew)

brew_formulae:
  # Core utils
  - git
  - curl
  - wget
  - jq
  - yq
  - ripgrep
  - fd
  - bat
  - eza          # modern ls
  - htop
  - btop
  - tmux
  - tree
  - unzip
  - zstd
  - gnu-sed
  - coreutils
  - zoxide         # smart cd
  - fzf            # fuzzy finder
  - the_silver_searcher  # ag (used in agfzf/vg shell functions)
  - antidote       # zsh plugin manager
  # Editor + shell
  - neovim
  - starship
  - lazygit
  - lazydocker
  - tree-sitter
  # Dev
  - go
  - rustup
  - python@3.12
  - uv            # fast Python package manager
  - node
  - mise          # polyglot version manager
  - gh            # GitHub CLI
  - glab          # GitLab CLI
  - git-filter-repo
  # Cloud / Data
  - awscli
  - azure-cli
  - cloudflared
  - mosh          # mobile shell (SSH over UDP)
  # Containers
  - colima        # Docker runtime for macOS without Docker Desktop
  - docker
  - docker-compose
  # Infra
  - ansible
  - chezmoi
  # Disk / system
  - dua-cli
  - dust
  # Media / misc
  - ffmpeg
  - yt-dlp

brew_casks:
  - ghostty       # terminal
  - visual-studio-code
  - 1password-cli
